name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        # Release PR 分支上 lock 可能与 bump 后的 package.json 不同步：PR 用 install 容忍漂移，main 用 ci 保持严格
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            npm install
          else
            npm ci
          fi

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Local-binding gate
        run: node scripts/check-no-local-bindings.mjs
