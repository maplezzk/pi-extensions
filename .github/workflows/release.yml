name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  # release-please manifest 模式：自动管理各包版本号 + changelog + 创建 Release PR
  release-please:
    runs-on: ubuntu-latest
    outputs:
      paths_released: ${{ steps.release.outputs.paths_released }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # Release PR 合并后按包发布 npm（OIDC trusted publishing，免 token）
  publish-npm:
    needs: release-please
    if: ${{ needs.release-please.outputs.paths_released }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - dir: packages/pi-extensions-i18n
          - dir: packages/pi-distill
          - dir: packages/pi-tool-supervisor
          - dir: packages/pi-extensions-tool-display
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Update npm for OIDC support
        run: |
          corepack enable npm
          corepack prepare npm@latest --activate
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Publish to npm
        if: ${{ contains(needs.release-please.outputs.paths_released, matrix.dir) }}
        working-directory: ${{ matrix.dir }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [[ "$VERSION" =~ -[a-zA-Z] ]]; then
            echo "Publishing prerelease version $VERSION with tag 'beta'"
            npm publish --provenance --tag beta
          else
            echo "Publishing stable version $VERSION"
            npm publish --provenance
          fi
